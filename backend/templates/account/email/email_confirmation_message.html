<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Konfirmasi Email</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f1f5f9;
      font-family: Arial, sans-serif;
      color: #0f172a;
    "
  >
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
      <tr>
        <td align="center" style="padding: 40px 16px">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="560"
            style="
              max-width: 560px;
              background: #ffffff;
              border: 1px solid #e2e8f0;
              border-radius: 18px;
              box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
            "
          >
            <tr>
              <td style="padding: 28px 32px 12px">
                <div
                  style="
                    font-size: 12px;
                    font-weight: 700;
                    letter-spacing: 0.16em;
                    text-transform: uppercase;
                    color: #0048b4;
                  "
                >
                  CSL USE
                </div>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 0 32px 8px;
                  font-size: 24px;
                  font-weight: 700;
                  line-height: 1.3;
                  color: #0f172a;
                "
              >
                Konfirmasi email Anda
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 0 32px 24px;
                  font-size: 14px;
                  line-height: 1.7;
                  color: #475569;
                "
              >
                Halo {{ user.email }},
                <br /><br />
                Terima kasih sudah mendaftar di {{ current_site }}. Silakan
                konfirmasi email Anda lewat tombol berikut.
              </td>
            </tr>
            <tr>
              <td style="padding: 0 32px 24px">
                <a
                  href="{{ activate_url }}"
                  style="
                    display: inline-block;
                    background: #0048b4;
                    color: #ffffff;
                    text-decoration: none;
                    padding: 12px 20px;
                    border-radius: 10px;
                    font-weight: 600;
                  "
                >
                  Konfirmasi Email
                </a>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 0 32px 16px;
                  font-size: 12px;
                  line-height: 1.6;
                  color: #64748b;
                "
              >
                Jika Anda tidak merasa mendaftar, abaikan email ini.
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 20px 32px 28px;
                  font-size: 12px;
                  line-height: 1.7;
                  color: #64748b;
                  border-top: 1px solid #e2e8f0;
                "
              >
                Terima kasih,<br />
                CSL USE<br />
                School of STEM<br />
                Universitas Prasetiya Mulya
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
